<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snow Archive</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="layout">

        <!-- 왼쪽 페이지 -->
        <div class="page left-page"></div>

        <!-- 수정구 -->
        <div class="ball" id="ball">

            <!-- 움직이는 중심점 -->
            <div id="mover">

                <!-- 눈 결정 -->
                <svg
                    class="snow"
                    id="snow"
                    viewBox="-100 -100 200 200">

                    <!-- 중심 결정 -->
                    <polygon points="
                    0,-16
                    14,-8
                    14,8
                    0,16
                    -14,8
                    -14,-8" />

                    <!-- 큰 가지 -->
                    <line x1="0" y1="-80" x2="0" y2="-25"/>
                    <line x1="0" y1="25" x2="0" y2="80"/>

                    <line x1="-69" y1="-40" x2="-22" y2="-13"/>
                    <line x1="22" y1="13" x2="69" y2="40"/>

                    <line x1="-69" y1="40" x2="-22" y2="13"/>
                    <line x1="22" y1="-13" x2="69" y2="-40"/>

                    <!-- 작은 가지 -->
                    <line x1="0" y1="-55" x2="-10" y2="-45"/>
                    <line x1="0" y1="-55" x2="10" y2="-45"/>

                    <line x1="0" y1="55" x2="-10" y2="45"/>
                    <line x1="0" y1="55" x2="10" y2="45"/>

                    <line x1="-48" y1="-28" x2="-35" y2="-30"/>
                    <line x1="-48" y1="-28" x2="-42" y2="-15"/>

                    <line x1="48" y1="28" x2="35" y2="30"/>
                    <line x1="48" y1="28" x2="42" y2="15"/>

                    <line x1="-48" y1="28" x2="-35" y2="30"/>
                    <line x1="-48" y1="28" x2="-42" y2="15"/>

                    <line x1="48" y1="-28" x2="35" y2="-30"/>
                    <line x1="48" y1="-28" x2="42" y2="-15"/>

                    <!-- 끝 장식 -->
                    <circle cx="0" cy="-80" r="3"/>
                    <circle cx="0" cy="80" r="3"/>

                    <circle cx="-69" cy="-40" r="3"/>
                    <circle cx="69" cy="40" r="3"/>

                    <circle cx="-69" cy="40" r="3"/>
                    <circle cx="69" cy="-40" r="3"/>

                </svg>

            </div>

        </div>

        <!-- 오른쪽 페이지 -->
        <div class="right-column">

            <div class="page top-page"></div>

            <div class="page bottom-page"></div>

        </div>

    </div>

    <script src="script.js"></script>

</body>

</html>
